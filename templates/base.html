<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MotoCenter360</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="main-header">

    <div class="top-header">

        <div class="logo">
            <a href="/" style="text-decoration:none;">
                <h1>MotoCenter<span>360</span></h1>
            </a>
        </div>

        <div class="search-box">
            <input type="text" placeholder="Hola, ¿Qué estás buscando?">
            <button>🔍</button>
        </div>

        <div class="header-actions">
            <a href="#">👤 Crear Cuenta</a>
            <a href="#">🔑 Ingresar</a>
            <a href="#">🛒 <span class="cart-badge">0</span></a>
        </div>

    </div>

    <nav class="menu-bar">

        <div class="menu-categorias">
            ☰ CATEGORÍAS ▼
        </div>

        <ul>
            <li><a href="/">INICIO</a></li>
            <li><a href="/catalogo">MOTOCICLETAS</a></li>
            <li><a href="#">REFACCIONES</a></li>
            <li><a href="#">OFERTAS</a></li>
            <li><a href="/taller">TALLER</a></li>
        </ul>

    </nav>

</header>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
