<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCenter360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        .header-container {
            background-color: #000;
            padding: 15px 40px 10px 40px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
        }
        
        .logo span {
            color: #ff0000;
        }

        /* Ahora es un formulario, no solo un div */
        .search-box {
            flex-grow: 1;
            display: flex;
            justify-content: flex-end;
        }

        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            background-color: #fff;
            color: #000;
        }

        .menu-links {
            display: flex;
            gap: 30px;
            justify-content: flex-start;
            align-items: center;
        }

        .menu-links a {
            color: #ff0000;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .menu-links a:hover {
            color: #fff;
        }
        
        /* Estilo especial para resaltar el carrito */
        .btn-carrito-nav {
            background-color: #222;
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid #ff0000;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="top-bar">
            <a href="/" class="logo">MotoCenter<span>360</span></a>
            
            <form action="{{ url_for('buscar') }}" method="GET" class="search-box">
                <input type="text" name="q" placeholder="Buscar motos, cascos, aceites...">
            </form>
            
        </div>
        <div class="menu-links">
            <a href="/">INICIO</a>
            <a href="{{ url_for('categoria_productos', categoria='motocicleta') }}">MOTOCICLETA</a>
            <a href="/refacciones">REFACCIONES</a>
            <a href="{{ url_for('categoria_productos', categoria='accesorios') }}">ACCESORIOS</a>
            <a href="#">TALLER</a>
            <a href="{{ url_for('ver_carrito') }}" class="btn-carrito-nav">🛒 CARRITO ({{ session.get('carrito', [])|length }})</a>
        </div>
    </div>

    {% block content %}{% endblock %}
</body>
</html>
