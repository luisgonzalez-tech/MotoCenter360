<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* Contenedor principal de la barra de navegación */
        .navbar-custom { 
            background-color: #000; 
            padding: 15px 40px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        
        .navbar-brand { font-weight: 900; color: #fff; font-size: 1.8rem; text-decoration: none; }
        .navbar-brand span { color: #ff0000; }
        
        /* Centrar el buscador */
        .search-container { flex-grow: 1; display: flex; justify-content: center; }
        .search-input { border-radius: 50px; padding: 8px 20px; border: none; width: 100%; max-width: 400px; }
        
        /* Alinear menú a la derecha */
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: #ff0000; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; text-decoration: none; }
        .nav-links a:hover { color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar-custom">
        <a class="navbar-brand" href="/">MotoCenter<span>360</span></a>
        
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Hola, ¿Qué estás buscando?">
        </div>
        
        <div class="nav-links">
            <a href="/">INICIO</a>
            <a href="#">MOTOCICLETA</a>
            <a href="/refacciones">REFACCIONES</a>
            <a href="#">ACCESORIOS</a>
            <a href="#">MÁS ALTO</a>
        </div>
    </nav>
    
    {% block content %}{% endblock %}
</body>
</html>
