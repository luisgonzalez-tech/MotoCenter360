<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCenter360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* Contenedor general de la cabecera */
        .header-container {
            background-color: #000;
            padding: 15px 40px 10px 40px;
        }

        /* Fila superior: Logo y buscador */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px; /* Espacio para separar del menú de abajo */
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
        }
        
        .logo span {
            color: #ff0000;
        }

        .search-box {
            flex-grow: 1;
            display: flex;
            justify-content: flex-end; /* Alinea el buscador a la derecha */
        }

        .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        /* Fila inferior: Menú (Zona Gris en tu imagen) */
        .menu-links {
            display: flex;
            gap: 30px; /* Separación entre los links */
            justify-content: flex-start; /* Alineados a la izquierda debajo del logo */
        }

        .menu-links a {
            color: #ff0000;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .menu-links a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="top-bar">
            <a href="/" class="logo">MotoCenter<span>360</span></a>
            <div class="search-box">
                <input type="text" placeholder="Hola, ¿Qué estás buscando?">
            </div>
        </div>
        <div class="menu-links">
            <a href="/">INICIO</a>
            <a href="{{ url_for('categoria_productos', categoria='motocicleta') }}">MOTOCICLETA</a>
            <a href="/refacciones">REFACCIONES</a>
            <a href="#">ACCESORIOS</a>
            <a href="#">TALLER</a>
        </div>
    </div>

    {% block content %}{% endblock %}
</body>
</html>
