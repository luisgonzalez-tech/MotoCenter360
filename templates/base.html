<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000 !important; color: #fff !important; font-family: sans-serif; margin: 0; }
        .navbar { background-color: #000 !important; padding: 15px 0; border-bottom: none; }
        .navbar-brand { font-weight: 900; color: #fff !important; font-size: 1.8rem; text-decoration: none; }
        .search-input { border-radius: 50px; padding: 5px 15px; border: none; background: #fff; width: 350px; }
        .nav-link-custom { color: #ff0000 !important; font-weight: 700; text-transform: uppercase; font-size: 0.85rem; margin-right: 20px; text-decoration: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container d-flex flex-column align-items-start">
            <!-- Fila superior: Logo y Buscador -->
            <div class="d-flex w-100 justify-content-between align-items-center mb-3">
                <a class="navbar-brand" href="/">MotoCenter<span style="color: #ff0000;">360</span></a>
                <input type="text" class="form-control search-input" placeholder="Hola, ¿Qué estás buscando?">
            </div>
            <!-- Fila inferior: El Menú donde debe ir -->
            <div class="d-flex">
                <a class="nav-link-custom" href="/">INICIO</a>
                <a class="nav-link-custom" href="#">MOTOCICLETA</a>
                <a class="nav-link-custom" href="/refacciones">REFACCIONES</a>
                <a class="nav-link-custom" href="#">ACCESORIOS</a>
                <a class="nav-link-custom" href="#">MÁS ALTO</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
