<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MotoCenter360</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        
        /* Barra de navegación en una sola línea */
        .navbar-custom {
            background-color: #000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .navbar-custom .logo {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
        }
        
        .navbar-custom .logo span {
            color: #ff0000;
        }

        .navbar-custom .search-box {
            flex-grow: 1;
            display: flex;
            justify-content: center;
        }

        .navbar-custom .search-box input {
            width: 100%;
            max-width: 400px;
            padding: 8px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
        }

        .navbar-custom .menu-links {
            display: flex;
            gap: 20px;
        }

        .navbar-custom .menu-links a {
            color: #ff0000;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .navbar-custom .menu-links a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="navbar-custom">
        <a href="/" class="logo">MotoCenter<span>360</span></a>
        <div class="search-box">
            <input type="text" placeholder="Hola, ¿Qué estás buscando?">
        </div>
        <div class="menu-links">
            <a href="/">INICIO</a>
            <a href="#">MOTOCICLETA</a>
            <a href="/refacciones">REFACCIONES</a>
            <a href="#">ACCESORIOS</a>
            <a href="#">MÁS ALTO</a>
        </div>
    </div>

    {% block content %}{% endblock %}
</body>
</html>
