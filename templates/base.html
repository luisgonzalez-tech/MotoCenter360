<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #000000 !important; color: #ffffff !important; font-family: sans-serif; }
        .navbar { background-color: #000000 !important; border-bottom: 1px solid #333; }
        .nav-link { color: #ff0000 !important; font-weight: 200 !important; }
        .search-input { background-color: #ffffff !important; border-radius: 50px !important; border: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark py-3">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand fw-bold fs-2" href="/">MotoCenter<span style="color: #ff0000;">360</span></a>
            <input type="text" class="form-control search-input mx-auto" style="max-width: 400px;" placeholder="Hola, ¿Qué estás buscando?">
        </div>
        <div class="container mt-2">
            <div class="d-flex gap-4">
                <a class="nav-link" href="/">INICIO</a>
                <a class="nav-link" href="#">MOTOCICLETAS</a>
                <a class="nav-link" href="#">REFACCIONES</a>
                <a class="nav-link" href="#">ACCESORIOS</a>
                <a class="nav-link" href="/taller">TALLER</a>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
