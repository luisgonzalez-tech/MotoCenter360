{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container { position: relative; width: 100%; height: 500px; overflow: hidden; }
    .hero-image { width: 100%; height: 100%; object-fit: cover; }
    
    /* CAMBIO AQUÍ: Degradado más oscuro e intenso en la zona izquierda */
    .overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 35%, rgba(0,0,0,0) 65%);
        z-index: 1;
    }
    
    /* Texto intacto */
    .text-content { 
        position: absolute; top: 22%; left: 5%; 
        z-index: 10; 
        max-width: 650px;
    }
    
    .text-content h1 { font-weight: 900; font-size: 3.5rem; line-height: 1; text-transform: uppercase; color: #fff; margin-bottom: 15px; text-shadow: 2px 2px 4px #000; }
    .text-content h1 span { color: #ff0000; }
    .text-content p { font-weight: 400; font-size: 1rem; color: #fff; margin-bottom: 25px; text-shadow: 1px 1px 3px #000; }
    .btn-conoce { background-color: #ff0000; color: #fff; border: none; padding: 12px 35px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
    .btn-conoce:hover { background-color: #cc0000; }
</style>

<div class="hero-container">
    <img src="{{ url_for('static', filename='img/motos/banner.jpg') }}" class="hero-image">
    <div class="overlay"></div>
    
    <div class="text-content">
        <h1>LA FUERZA DETRÁS<br><span>DE CADA KILÓMETRO</span></h1>
        
        <p>NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>MÁXIMO DESEMPEÑO, PRECISIÓN Y DURABILIDAD.</p>
        
        <button class="btn-conoce">CONOCE MÁS</button>
    </div>
</div>
{% endblock %}
