{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container { position: relative; width: 100%; height: 500px; overflow: hidden; }
    .hero-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
    
    /* Área azul: Menú movido aquí */
    .nav-area { position: absolute; top: 110px; left: 10%; z-index: 15; }
    
    /* Área verde: Más pegada a la izquierda y con fondo más oscuro */
    .text-content { 
        position: absolute; top: 25%; left: 3%; z-index: 10; 
        background: rgba(0,0,0,0.7); /* Fondo más oscuro */
        padding: 30px; border-radius: 5px;
    }
</style>

<div class="hero-container">
    <img src="{{ url_for('static', filename='img/motos/banner.jpg') }}" class="hero-image">
    
    <!-- Enlaces (lo morado ahora en lo azul) -->
    <div class="nav-area">
        <a class="nav-link-custom" href="/">INICIO</a>
        <a class="nav-link-custom" href="#">MOTOCICLETA</a>
        <a class="nav-link-custom" href="/refacciones">REFACCIONES</a>
        <a class="nav-link-custom" href="#">ACCESORIOS</a>
        <a class="nav-link-custom" href="#">MÁS ALTO</a>
    </div>

    <!-- Bloque de texto (verde) pegado a la orilla -->
    <div class="text-content">
        <h1 style="font-weight: 900; font-size: 3.5rem; line-height: 0.95; text-transform: uppercase; color: #fff;">
            LA FUERZA DETRÁS<br>
            <span style="color: #ff0000;">DE CADA KILÓMETRO</span>
        </h1>
        <p style="font-weight: 300; font-size: 1.1rem; color: #fff; margin-top: 15px;">
            NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>
            MÁXIMO DESEMPEÑO, PRECISIÓN Y DURABILIDAD.
        </p>
        <button style="background-color: #ff0000; color: #fff; border: none; padding: 10px 30px; font-weight: bold;">CONOCE MÁS</button>
    </div>
</div>
{% endblock %}
