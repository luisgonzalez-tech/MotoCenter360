{% extends 'base.html' %}
{% block content %}
<div style="position: relative; width: 100%; height: 500px; overflow: hidden;">
    <!-- Imagen de fondo -->
    <img src="{{ url_for('static', filename='img/motos/banner.jpg') }}" style="width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 0;">
    
    <!-- Oscurecimiento (Degradado) -->
    <div style="position: absolute; width: 100%; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.95) 40%, rgba(0,0,0,0.1) 100%); z-index: 1;"></div>
    
    <!-- Texto -->
    <div style="position: absolute; top: 20%; left: 8%; z-index: 2; color: #ffffff;">
        <h1 style="font-size: 3.5rem; font-weight: 900; font-style: italic; text-transform: uppercase; line-height: 1;">
            LA FUERZA DETRÁS<br><span style="color: #ff0000;">DE CADA KILÓMETRO</span>
        </h1>
        <p style="text-transform: uppercase; font-weight: 300; margin-top: 20px; line-height: 1.5;">
            NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>
            MAXIMO DESEMPEÑO PRECISIÓN Y DURABILIDAD<br>
            EN CADA RECORRIDO
        </p>
        <button style="background-color: #ff0000; color: #ffffff; border: none; padding: 12px 35px; font-weight: bold; text-transform: uppercase; cursor: pointer;">
            CONOCE MÁS
        </button>
    </div>
</div>
{% endblock %}
