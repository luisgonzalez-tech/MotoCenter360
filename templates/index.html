{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container { position: relative; width: 100%; height: 500px; overflow: hidden; }
    .hero-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(45%); }
    
    .text-content { 
        position: absolute; top: 22%; left: 8%; z-index: 10; 
        /* Sombra global para que el texto resalte sobre cualquier fondo */
        text-shadow: 2px 2px 10px rgba(0,0,0,0.8); 
    }
</style>

<div class="hero-container">
    <img src="{{ url_for('static', filename='img/motos/banner.jpg') }}" class="hero-image">
    
    <div class="text-content">
        <h1 style="font-weight: 800; font-size: 4rem; line-height: 0.95; text-transform: uppercase; color: #fff; margin-bottom: 20px;">
            LA FUERZA DETRÁS<br>
            <span style="color: #ff0000;">DE CADA KILÓMETRO</span>
        </h1>
        
        <p style="font-weight: 300; font-size: 1.1rem; color: #fff; line-height: 1.4; margin-bottom: 25px;">
            NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>
            MÁXIMO DESEMPEÑO, PRECISIÓN Y DURABILIDAD.
        </p>
        
        <button style="background-color: #ff0000; color: #fff; border: none; padding: 10px 35px; font-weight: 600; font-size: 0.9rem; text-transform: uppercase;">
            Conoce más
        </button>
    </div>
</div>
{% endblock %}
