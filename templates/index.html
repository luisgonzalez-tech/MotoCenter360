{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container { position: relative; width: 100%; height: 500px; overflow: hidden; }
    .hero-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
    
    /* Ajuste de posición (más a la izquierda) y sombra del texto */
    .text-content { 
        position: absolute; 
        top: 25%; 
        left: 5%; /* Más pegado a la orilla */
        z-index: 10; 
        text-shadow: 3px 3px 8px rgba(0,0,0,1); /* Sombra intensa para resaltar */
    }
</style>

<div class="hero-container">
    <img src="{{ url_for('static', filename='img/motos/banner.jpg') }}" class="hero-image">
    
    <div class="text-content">
        <!-- Texto ligeramente más pequeño (tamaño 3.2rem) -->
        <h1 style="font-weight: 900; font-size: 3.2rem; line-height: 0.95; text-transform: uppercase; color: #fff;">
            LA FUERZA DETRÁS<br>
            <span style="color: #ff0000;">DE CADA KILÓMETRO</span>
        </h1>
        
        <p style="font-weight: 400; font-size: 1rem; color: #fff; margin-top: 15px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8);">
            NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>
            MÁXIMO DESEMPEÑO, PRECISIÓN Y DURABILIDAD.
        </p>
        
        <button style="background-color: #ff0000; color: #fff; border: none; padding: 10px 30px; font-weight: bold; cursor: pointer;">
            CONOCE MÁS
        </button>
    </div>
</div>
{% endblock %}
