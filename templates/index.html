<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS para diseño profesional -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>MotoCenter360 | Gestión de Agencia</title>
</head>
<body class="bg-light">

    <!-- Barra de navegación profesional -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">MotoCenter360</a>
        </div>
    </nav>

    <div class="container">
        <h1 class="text-primary mb-4">Bienvenido a MotoCenter360</h1>
        <h2 class="h4 mb-3">Inventario Actual:</h2>
        
        <div class="row">
            {% for producto, cantidad in stock.items() %}
            <div class="col-md-4 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-capitalize">{{ producto }}</h5>
                        <p class="card-text">
                            Disponibilidad: <span class="badge bg-success">{{ cantidad }} unidades</span>
                        </p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Scripts de Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
