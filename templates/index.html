{% extends 'base.html' %}
{% block content %}
<style>
    .hero-container { position: relative; width: 100%; height: 550px; overflow: hidden; }
    .hero-image { width: 100%; height: 100%; object-fit: cover; filter: brightness(40%); }
    .text-content { position: absolute; top: 25%; left: 8%; z-index: 10; }
</style>

<div class="hero-container">
    <img src="{{ url_for('static', filename='img/motos/banner.jpg') }}" class="hero-image">
    
    <div class="text-content">
        <!-- Título con fuente gruesa (Bold) y color exacto -->
        <h1 style="font-weight: 900; font-size: 4.5rem; line-height: 0.9; text-transform: uppercase; color: #fff;">
            LA FUERZA DETRÁS<br>
            <span style="color: #ff0000;">DE CADA KILÓMETRO</span>
        </h1>
        <p class="mt-4" style="font-weight: 400; font-size: 1.2rem; color: #fff;">
            NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>
            MAXIMO DESEMPEÑO PRECISIÓN Y DURABILIDAD<br>
            EN CADA RECORRIDO
        </p>
        <button style="background-color: #ff0000; color: #fff; border: none; padding: 12px 40px; font-weight: bold; margin-top: 15px;">CONOCE MÁS</button>
    </div>
</div>
{% endblock %}
