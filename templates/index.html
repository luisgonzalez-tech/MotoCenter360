{% extends 'base.html' %}
{% block content %}
<style>
    .hero-section {
        position: relative;
        width: 100%;
        height: 500px;
        background-image: url("{{ url_for('static', filename='img/motos/banner.jpg') }}");
        background-size: cover;
        background-position: center;
        display: flex;
        align-items: center;
    }

    /* Capa oscura a la izquierda */
    .hero-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 40%, rgba(0,0,0,0) 100%);
        z-index: 1;
    }

    .hero-content {
        position: relative;
        z-index: 2;
        padding-left: 50px;
        max-width: 600px;
    }

    /* Título reducido (de 45px a 36px) */
    .hero-content h1 {
        font-size: 36px; 
        font-weight: 900;
        color: #fff;
        margin: 0 0 10px 0;
        line-height: 1.1;
        text-transform: uppercase;
        font-style: italic;
    }

    .hero-content h1 span {
        color: #ff0000;
    }

    /* Párrafo reducido */
    .hero-content p {
        font-size: 13px;
        color: #ddd;
        margin-bottom: 20px;
        line-height: 1.5;
    }

    .hero-btn {
        background-color: #ff0000;
        color: #fff;
        border: none;
        padding: 10px 25px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
    }
    
    .hero-btn:hover {
        background-color: #cc0000;
    }
</style>

<div class="hero-section">
    <div class="hero-overlay"></div>
    
    <div class="hero-content">
        <h1>LA FUERZA DETRÁS<br><span>DE CADA KILÓMETRO</span></h1>
        <p>NUEVA LÍNEA DE REFACCIONES DISEÑADAS PARA OFRECER<br>MÁXIMO DESEMPEÑO, PRECISIÓN Y DURABILIDAD<br>EN CADA RECORRIDO.</p>
        <button class="hero-btn">CONOCE MÁS</button>
    </div>
</div>
{% endblock %}
