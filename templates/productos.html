{% extends 'base.html' %}
{% block content %}
<style>
    /* ... (tus estilos actuales se quedan igual) ... */
    .btn-volver {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 20px;
        background-color: #444;
        color: white;
        text-decoration: none;
        border-radius: 4px;
        font-size: 14px;
        border: 1px solid #666;
    }
    .btn-volver:hover {
        background-color: #555;
    }
</style>

<div style="color: white; padding: 40px; text-align: center;">
    <a href="{{ url_for('refacciones') }}" class="btn-volver">← Volver a categorías</a>
    
    <h1>Resultados para: {{ categoria.capitalize() }}</h1>
    
    <div class="catalogo-grid">
        {% for p in productos %}
            <div class="tarjeta-producto">
                <div class="imagen-contenedor">
                    <img src="{{ p.imagen_url }}" alt="{{ p.nombre }}">
                </div>
                <h3 style="font-size: 15px; height: 40px;">{{ p.nombre }}</h3>
                <p style="font-size: 14px; color: #888;">Marca: {{ p.marca }}</p>
                <p style="font-size: 18px; font-weight: bold; color: #f90;">${{ "%.2f"|format(p.precio) }}</p>
                
                <form action="{{ url_for('agregar_carrito', producto_id=p.id) }}" method="POST" style="width: 100%;">
                    <button type="submit" class="btn-agregar">Agregar al Carrito</button>
                </form>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
