{% extends 'base.html' %}
{% block content %}
<style>
    .grid-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        padding: 40px;
    }
    .tarjeta {
        background: #111;
        border: 1px solid #333;
        padding: 15px;
        text-align: center;
        border-radius: 8px;
    }
    .img-box {
        background: white; /* Esto pone el fondo blanco que querías */
        height: 180px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
        border-radius: 4px;
    }
    .img-box img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }
</style>

<div style="color: white;">
    <h1 style="text-align: center; padding: 20px;">Resultados para: {{ categoria.capitalize() }}</h1>
    
    <div class="grid-container">
        {% for p in productos %}
            <div class="tarjeta">
                <div class="img-box">
                    <img src="{{ p.imagen_url }}" alt="{{ p.nombre }}">
                </div>
                <h3>{{ p.nombre }}</h3>
                <p>Marca: {{ p.marca }}</p>
                <p style="font-weight: bold; color: #f90;">${{ "%.2f"|format(p.precio) }}</p>
                <form action="{{ url_for('agregar_carrito', producto_id=p.id) }}" method="POST">
                    <button type="submit" style="background:#f90; padding:10px; width:100%; border:none; cursor:pointer;">
                        Agregar al Carrito
                    </button>
                </form>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
