{% extends 'base.html' %}
{% block content %}
<style>
    .contenedor-pagina { padding: 40px; color: white; max-width: 1200px; margin: auto; }
    
    /* Botón Rojo a la izquierda */
    .nav-arriba { 
        display: flex; 
        justify-content: flex-start; 
        margin-bottom: 20px; 
    }
    .btn-volver { 
        padding: 10px 20px; 
        background-color: #d00; /* Rojo */
        color: white; 
        text-decoration: none; 
        border-radius: 4px; 
        font-weight: bold;
    }
    .btn-volver:hover { background-color: #a00; }

    /* Grid con tamaño fijo */
    .catalogo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
    }

    /* Tarjetas de tamaño uniforme */
    .tarjeta {
        background: #111; 
        border: 1px solid #333; 
        padding: 15px;
        text-align: center; 
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 420px; /* Altura fija para que todos sean iguales */
    }

    .img-box { 
        background: white; height: 160px; display: flex; 
        align-items: center; justify-content: center; margin-bottom: 10px; 
    }
    .img-box img { max-width: 90%; max-height: 140px; object-fit: contain; }

    /* Estilo de texto como en la referencia */
    .tarjeta h3 { font-size: 14px; margin: 10px 0; color: #fff; line-height: 1.2; }
    .marca-txt { font-size: 13px; color: #aaa; margin-bottom: 5px; }
    .precio-txt { font-size: 16px; font-weight: bold; color: #f90; margin-bottom: 10px; }

    .btn-agregar {
        background: #f90; color: #000; border: none; padding: 10px;
        width: 100%; cursor: pointer; border-radius: 4px; font-weight: bold;
    }
</style>

<div class="contenedor-pagina">
    <div class="nav-arriba">
        <a href="{{ url_for('refacciones') }}" class="btn-volver">← Volver</a>
    </div>
    
    <h1 style="text-align: center;">Resultados para: {{ categoria.capitalize() }}</h1>
    
    <div class="catalogo-grid">
        {% for p in productos %}
            <div class="tarjeta">
                <div class="img-box"><img src="{{ p.imagen_url }}" alt="{{ p.nombre }}"></div>
                <h3>{{ p.nombre }}</h3>
                <p class="marca-txt">Marca: {{ p.marca }}</p>
                <p class="precio-txt">${{ "%.2f"|format(p.precio) }}</p>
                <form action="{{ url_for('agregar_carrito', producto_id=p.id) }}" method="POST">
                    <button type="submit" class="btn-agregar">Agregar al Carrito</button>
                </form>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
