{% extends 'base.html' %}
{% block content %}
<div style="padding: 40px; color: white;">
    <h1>Resultados para: {{ categoria.capitalize() }}</h1>
    <div style="display: flex; flex-wrap: wrap; gap: 20px;">
        {% for p in productos %}
            <div style="border: 1px solid #444; padding: 20px; width: 200px;">
                <img src="{{ p.imagen_url }}" style="width: 100%;">
                <h3>{{ p.nombre }}</h3>
                <p>${{ p.precio }}</p>
                <form action="{{ url_for('agregar_carrito', producto_id=p.id) }}" method="POST">
                    <button type="submit" style="background:orange; padding:10px; cursor:pointer;">
                        Agregar al Carrito
                    </button>
                </form>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
