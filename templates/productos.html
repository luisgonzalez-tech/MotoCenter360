{% extends 'base.html' %}
{% block content %}
<style>
    .catalogo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 20px;
        padding: 40px;
        max-width: 1200px;
        margin: auto;
    }
    .tarjeta-producto {
        background: #111;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
    }
    .imagen-contenedor {
        background: white;
        width: 100%;
        height: 200px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 4px;
        margin-bottom: 15px;
    }
    .imagen-contenedor img {
        max-width: 90%;
        max-height: 180px;
        object-fit: contain;
    }
    .btn-agregar {
        background: #f90;
        color: #000;
        border: none;
        padding: 12px;
        width: 100%;
        font-weight: bold;
        cursor: pointer;
        border-radius: 4px;
        margin-top: auto;
    }
</style>

<div style="color: white;">
    <h1 style="text-align: center; padding-top: 30px;">Resultados para: {{ categoria.capitalize() }}</h1>
    
    <div class="catalogo-grid">
        {% for p in productos %}
            <div class="tarjeta-producto">
                <div class="imagen-contenedor">
                    <img src="{{ p.imagen_url }}" alt="{{ p.nombre }}">
                </div>
                <h3 style="font-size: 15px; height: 40px;">{{ p.nombre }}</h3>
                <p style="font-size: 14px; color: #888;">Marca: {{ p.marca }}</p>
                <p style="font-size: 18px; font-weight: bold; color: #f90;">${{ "%.2f"|format(p.precio) }}</p>
                
                <form action="{{ url_for('agregar_carrito', producto_id=p.id) }}" method="POST" style="width: 100%;">
                    <button type="submit" class="btn-agregar">Agregar al Carrito</button>
                </form>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
