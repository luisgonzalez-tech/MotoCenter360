{% extends 'base.html' %}
{% block content %}
<style>
    .catalogo-container {
        display: flex;
        max-width: 1300px;
        margin: 0 auto;
        padding: 40px 20px;
        gap: 30px;
        color: #fff;
    }

    /* Panel de Filtros Izquierdo */
    .sidebar-filtros {
        width: 260px;
        background: #0a0a0a;
        padding: 25px;
        border-radius: 10px;
        border: 1px solid #1a1a1a;
        height: fit-content;
    }

    .sidebar-filtros h3 {
        font-size: 1.3rem;
        text-transform: uppercase;
        margin-bottom: 20px;
        border-bottom: 2px solid #ff0000;
        padding-bottom: 10px;
        font-weight: 800;
    }

    .grupo-filtro {
        margin-bottom: 25px;
    }

    .grupo-filtro h4 {
        font-size: 0.95rem;
        color: #ff0000;
        margin-bottom: 12px;
        text-transform: uppercase;
        font-weight: 700;
    }

    .grupo-filtro label {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        color: #ccc;
        font-size: 0.9rem;
    }

    .grupo-filtro input[type="checkbox"] {
        accent-color: #ff0000;
        width: 16px;
        height: 16px;
    }

    /* Panel del Catálogo de Tarjetas */
    .contenido-productos {
        flex-grow: 1;
    }

    .titulo-categoria {
        font-size: 2.5rem;
        text-transform: uppercase;
        font-weight: 900;
        margin-bottom: 30px;
    }

    .productos-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 25px;
    }

    /* Tarjetas de Producto Estilo Premium */
    .producto-card {
        background: #0d0d0d;
        border: 1px solid #1a1a1a;
        border-radius: 8px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: all 0.3s ease;
    }

    .producto-card:hover {
        border-color: #ff0000;
        box-shadow: 0 5px 15px rgba(255, 0, 0, 0.1);
    }

    .producto-img-box {
        width: 100%;
        height: 180px;
        background: #000;
        border-radius: 6px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 15px;
    }

    .producto-img-box img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
    }

    .producto-marca {
        font-size: 0.8rem;
        color: #ff0000;
        text-transform: uppercase;
        font-weight: bold;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .producto-card h5 {
        font-size: 0.95rem;
        color: #fff;
        margin-bottom: 15px;
        line-height: 1.4;
        height: 40px;
        overflow: hidden;
    }

    .producto-precio {
        font-size: 1.4rem;
        font-weight: bold;
        color: #fff;
        margin-bottom: 15px;
    }

    .btn-agregar {
        background: #ff0000;
        color: #fff;
        border: none;
        padding: 12px;
        font-weight: bold;
        text-transform: uppercase;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
    }

    .btn-agregar:hover {
        background: #cc0000;
    }

    .sin-productos {
        color: #666;
        font-style: italic;
    }
</style>

<div class="catalogo-container">
    <aside class="sidebar-filtros">
        <h3>Filtros</h3>
        
        <div class="grupo-filtro">
            <h4>Marcas</h4>
            <label><input type="checkbox"> MOTUL</label>
            <label><input type="checkbox"> ITALIKA</label>
            <label><input type="checkbox"> NGK</label>
            <label><input type="checkbox"> RODA</label>
        </div>

        <div class="grupo-filtro">
            <h4>Precios</h4>
            <label><input type="checkbox"> $0 - $300</label>
            <label><input type="checkbox"> $300 - $1,000</label>
            <label><input type="checkbox"> $1,000+</label>
        </div>
    </aside>

    <main class="contenido-productos">
        <h1 class="titulo-categoria">Catálogo / <span style="color: #ff0000;">{{ categoria }}</span></h1>
        
        <div class="productos-grid">
            {% for p in productos %}
            <div class="producto-card">
                <div>
                    <div class="producto-img-box">
                        <img src="{{ p.imagen_url }}" alt="{{ p.nombre }}">
                    </div>
                    <p class="producto-marca">{{ p.marca }}</p>
                    <h5>{{ p.nombre }}</h5>
                </div>
                <div>
                    <div class="producto-precio">${{ p.precio }}</div>
                    <button class="btn-agregar">Agregar</button>
                </div>
            </div>
            {% else %}
            <p class="sin-productos">Aún no hay refacciones registradas en esta categoría.</p>
            {% endfor %}
        </div>
    </main>
</div>
{% endblock %}
