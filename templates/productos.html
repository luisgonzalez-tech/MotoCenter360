{% extends 'base.html' %}
{% block content %}
<div style="padding: 40px; color: white; max-width: 1200px; margin: auto;">
    <h1 style="text-align: center; margin-bottom: 40px;">Resultados para: {{ categoria.capitalize() }}</h1>
    
    <!-- Contenedor tipo Grid alineado -->
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
        {% for p in productos %}
            <!-- Tarjeta con altura fija y fondo profesional -->
            <div style="border: 1px solid #333; padding: 20px; display: flex; flex-direction: column; background: #111; border-radius: 8px;">
                
                <!-- Contenedor de imagen con fondo blanco -->
                <div style="background: white; padding: 10px; border-radius: 5px; height: 200px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
                    <img src="{{ p.imagen_url }}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                </div>

                <!-- Textos con altura fija para mantener alineación -->
                <h3 style="font-size: 16px; margin: 10px 0; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
                    {{ p.nombre }}
                </h3>
                <p style="color: #aaa; font-size: 14px; margin: 5px 0;">Marca: {{ p.marca }}</p>
                <p style="font-weight: bold; font-size: 20px; color: #f90; margin: 10px 0;">${{ "%.2f"|format(p.precio) }}</p>
                
                <!-- Botón alineado al final -->
                <form action="{{ url_for('agregar_carrito', producto_id=p.id) }}" method="POST" style="margin-top: auto;">
                    <button type="submit" style="background: #f90; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; border-radius: 4px; width: 100%;">
                        Agregar al Carrito
                    </button>
                </form>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
