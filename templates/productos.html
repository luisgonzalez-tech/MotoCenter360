{% extends 'base.html' %}
{% block content %}
<div style="padding: 40px; color: #fff;">
    <h1>Categoría: {{ categoria|capitalize }}</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
        {% for p in productos %}
        <div style="background: #000; border: 1px solid #333; padding: 15px;">
            <img src="{{ p.imagen_url }}" style="width: 100%; height: 200px; object-fit: contain; background: #fff;">
            <h3>{{ p.nombre }}</h3>
            <p style="color: #ff0000;">{{ p.marca }}</p>
            <p>${{ p.precio }}</p>
        </div>
        {% else %}
        <p>No hay productos en esta categoría.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
