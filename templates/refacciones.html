{% extends 'base.html' %}
{% block content %}
<style>
    .refacciones-container { display: flex; padding: 40px; gap: 40px; color: #fff; }
    
    /* Panel izquierdo: Filtros */
    .sidebar { width: 250px; background: #111; padding: 20px; border-radius: 8px; }
    .filter-group { margin-bottom: 25px; }
    .filter-group h4 { color: #ff0000; font-size: 1.1rem; margin-bottom: 10px; }
    .filter-group label { display: block; font-size: 0.9rem; margin-bottom: 5px; cursor: pointer; }
    
    /* Panel derecho: Catálogo */
    .catalog { flex-grow: 1; }
    .grid-container { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
        gap: 20px; 
    }
</style>

<div class="refacciones-container">
    <!-- PANEL DE FILTROS -->
    <aside class="sidebar">
        <h3>Filtros</h3>
        <div class="filter-group">
            <h4>Marcas</h4>
            <label><input type="checkbox"> Bosch</label>
            <label><input type="checkbox"> Fram</label>
            <label><input type="checkbox"> K&N</label>
        </div>
        <div class="filter-group">
            <h4>Precio</h4>
            <label><input type="radio" name="precio"> $0 - $500</label>
            <label><input type="radio" name="precio"> $500 - $1000</label>
        </div>
    </aside>

    <!-- CATÁLOGO -->
    <main class="catalog">
        <h1>Refacciones</h1>
        <div class="grid-container">
            <!-- Aquí irían tus tarjetas de producto -->
            <div style="background:#1a1a1a; padding:20px;">Producto Ejemplo</div>
        </div>
    </main>
</div>
{% endblock %}
