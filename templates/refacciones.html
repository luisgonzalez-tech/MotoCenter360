{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <h2 class="mb-5" style="color: #fff; font-weight: 900; font-style: italic; text-transform: uppercase;">
        Catálogo de <span style="color: #ff0000;">Refacciones</span>
    </h2>
    
    <div class="row g-4">
        {% for cat in categorias %}
        <div class="col-6 col-md-3">
            <a href="#" style="color: #ccc; text-decoration: none; font-weight: 300; font-size: 1.1rem; transition: 0.3s;"
               onmouseover="this.style.color='#ff0000'" 
               onmouseout="this.style.color='#ccc'">
               • {{ cat }}
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
