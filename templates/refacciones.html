{% extends 'base.html' %}

{% block content %}
<div class="container my-5">
    <h2 class="mb-4" style="color: #fff; font-weight: 900; font-style: italic; text-transform: uppercase;">
        Catálogo de <span style="color: #ff0000;">Refacciones</span>
    </h2>
    <div class="row">
        {% for cat in categorias %}
        <div class="col-6 col-md-3 text-white py-2" style="font-weight: 300;">
            • {{ cat }}
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
