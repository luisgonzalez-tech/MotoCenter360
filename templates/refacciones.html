{% extends 'base.html' %}
{% block content %}
<style>
    .refacciones-wrapper {
        padding: 60px 40px;
        max-width: 1200px;
        margin: 0 auto;
        color: #fff;
    }

    .refacciones-title {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .refacciones-subtitle {
        color: #888;
        font-size: 1.1rem;
        margin-bottom: 40px;
    }

    /* Contenedor Flex para los 5 bloques */
    .categorias-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        list-style: none;
        padding: 0;
    }

    .categorias-grid li {
        flex: 1;
        min-width: 200px;
        font-size: 1.25rem;
        font-weight: bold;
        background: #111;
        border: 1px solid #222;
        border-radius: 8px;
        text-align: center;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        text-transform: uppercase;
    }

    .categorias-grid li a {
        color: #eee;
        text-decoration: none;
        display: block;
        padding: 25px 20px;
    }

    /* Efecto de enfoque deportivo (Rojo Puro) */
    .categorias-grid li:hover {
        border-color: #ff0000;
        transform: translateY(-5px);
        box-shadow: 0 8px 20px rgba(255, 0, 0, 0.2);
    }

    .categorias-grid li:hover a {
        color: #ff0000;
    }
</style>

<div class="refacciones-wrapper">
    <h1 class="refacciones-title">Catálogo de <span style="color: #ff0000;">Refacciones</span></h1>
    <p class="refacciones-subtitle">Selecciona una categoría para explorar componentes disponibles.</p>

    <ul class="categorias-grid">
        <li><a href="{{ url_for('categoria_productos', categoria='aceites') }}">Aceites</a></li>
        <li><a href="{{ url_for('categoria_productos', categoria='bujias') }}">Bujías</a></li>
        <li><a href="{{ url_for('categoria_productos', categoria='amortiguadores') }}">Amortiguadores</a></li>
        <li><a href="{{ url_for('categoria_productos', categoria='llantas') }}">Llantas</a></li>
        <li><a href="{{ url_for('categoria_productos', categoria='balatas') }}">Balatas</a></li>
    </ul>
</div>
{% endblock %}
