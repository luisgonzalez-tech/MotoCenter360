{% extends 'base.html' %}
{% block content %}
<style>
    .refacciones-wrapper {
        padding: 60px 40px;
        max-width: 1200px;
        margin: 0 auto;
        color: #fff;
    }

    .refacciones-title {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 40px;
        text-transform: uppercase;
        text-align: center;
    }

    .categorias-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        list-style: none;
        padding: 0;
    }

    .categorias-grid li {
        width: 200px;
        font-size: 1.2rem;
        font-weight: bold;
        background: #000000;
        border: 1px solid #333;
        border-radius: 8px;
        text-align: center;
        transition: all 0.3s ease;
        text-transform: uppercase;
    }

    .categorias-grid li a {
        color: #ffffff;
        text-decoration: none;
        display: block;
        padding: 20px;
    }

    .categorias-grid li:hover {
        border-color: #ff0000;
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
    }

    .categorias-grid li:hover a {
        color: #ff0000;
    }
</style>

<div class="refacciones-wrapper">
    <h1 class="refacciones-title">Catálogo de <span style="color: #ff0000;">Refacciones</span></h1>

    <ul class="categorias-grid">
        <li><a href="/refacciones/aceites">Aceites</a></li>
        <li><a href="/refacciones/bujias">Bujías</a></li>
        <li><a href="/refacciones/amortiguadores">Amortiguadores</a></li>
        <li><a href="/refacciones/llantas">Llantas</a></li>
        <li><a href="/refacciones/balatas">Balatas</a></li>
    </ul>
</div>
{% endblock %}
